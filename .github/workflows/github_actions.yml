name: VRCX-Luo

on:
    workflow_dispatch:
        inputs:
            release:
                description: 'Create GitHub Release after build?'
                type: boolean
                default: false
    push:
        tags:
            - '202*'

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

permissions:
    id-token: write
    contents: write

jobs:
    set_version:
        runs-on: ubuntu-latest
        outputs:
            version: ${{ steps.version.outputs.version }}
            date: ${{ steps.version.outputs.date }}
            short_sha: ${{ steps.version.outputs.short_sha }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - id: version
              run: |
                  SHORT_SHA="${GITHUB_SHA::7}"
                  BUILD_DATE="$(TZ=Asia/Shanghai date +'%Y.%-m.%-d')"

                  if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
                      VERSION="${GITHUB_REF_NAME}"
                  else
                      VERSION="${BUILD_DATE}-${SHORT_SHA}"
                  fi

                  DATE="$(echo "${VERSION}" | grep -oE '^[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}' || true)"
                  if [[ -z "${DATE}" ]]; then
                      DATE="${BUILD_DATE}"
                  fi

                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  echo "date=${DATE}" >> $GITHUB_OUTPUT
                  echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
                  echo "Build version: ${VERSION}"
                  echo "Installer version date: ${DATE}"

    build_dotnet_windows:
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        needs: [set_version, build_node]
        steps:
            - uses: actions/checkout@v6
            - name: Setup .NET 10
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '10.0.x'
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  {
                    echo "!pragma codepage UTF8"
                    echo "!define PRODUCT_VERSION_FROM_FILE \"${{ needs.set_version.outputs.date }}.0\""
                  } > Installer/version_define.nsh
                  cat Version
            - uses: actions/cache@v5
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/Dotnet/VRCX-Cef.csproj') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget-
            - name: Build Cef .NET Application
              run: dotnet build Dotnet/VRCX-Cef.csproj -p:Configuration=Release -p:WarningLevel=0 -p:Platform=x64 -p:PlatformTarget=x64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a x64 --self-contained
            - name: Check if we want to sign
              id: check_sign
              run: |
                  echo "sign=${{ secrets.AZURE_CLIENT_ID != '' }}" >> $GITHUB_OUTPUT
            - name: Azure login
              if: steps.check_sign.outputs.sign == 'true'
              uses: azure/login@v3
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
            - name: Sign Dotnet executables
              if: steps.check_sign.outputs.sign == 'true'
              uses: azure/trusted-signing-action@v1
              with:
                  azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
                  endpoint: https://eus.codesigning.azure.net/
                  trusted-signing-account-name: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  certificate-profile-name: ${{ secrets.AZURE_PROFILE_NAME }}
                  file-digest: SHA256
                  timestamp-rfc3161: http://timestamp.acs.microsoft.com
                  timestamp-digest: SHA256
                  files: |
                      ${{ github.workspace }}\build\Cef\CefSharp.BrowserSubprocess.Core.dll
                      ${{ github.workspace }}\build\Cef\CefSharp.Core.dll
                      ${{ github.workspace }}\build\Cef\CefSharp.Core.Runtime.dll
                      ${{ github.workspace }}\build\Cef\CefSharp.dll
                      ${{ github.workspace }}\build\Cef\CefSharp.OffScreen.dll
                      ${{ github.workspace }}\build\Cef\CefSharp.WinForms.dll
                      ${{ github.workspace }}\build\Cef\DiscordRPC.dll
                      ${{ github.workspace }}\build\Cef\libcef.dll
                      ${{ github.workspace }}\build\Cef\libEGL.dll
                      ${{ github.workspace }}\build\Cef\libGLESv2.dll
                      ${{ github.workspace }}\build\Cef\librsync.net.dll
                      ${{ github.workspace }}\build\Cef\VRCX-Luo.dll
                      ${{ github.workspace }}\build\Cef\VRCX-Luo.exe

            - name: Download Cef-html artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Cef-html
                  path: build/Cef/html
            - name: Install NSIS
              shell: pwsh
              run: choco install nsis -y
            - name: Create NSIS installer
              working-directory: Installer
              shell: pwsh
              run: '& "${env:ProgramFiles(x86)}\NSIS\makensis.exe" /INPUTCHARSET UTF8 installer.nsi'
            - name: Rename setup
              run: |
                  file_name="VRCX-Luo_${{ needs.set_version.outputs.version }}_Setup.exe"
                  echo "Setup FileName: ${file_name}"
                  mv Installer/VRCX-Luo_Setup.exe $file_name
            - name: Sign Cef setup
              uses: azure/trusted-signing-action@v1
              if: steps.check_sign.outputs.sign == 'true'
              with:
                  azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
                  endpoint: https://eus.codesigning.azure.net/
                  trusted-signing-account-name: ${{ secrets.AZURE_ACCOUNT_NAME }}
                  certificate-profile-name: ${{ secrets.AZURE_PROFILE_NAME }}
                  file-digest: SHA256
                  timestamp-rfc3161: http://timestamp.acs.microsoft.com
                  timestamp-digest: SHA256
                  files: |
                      ${{ github.workspace }}\VRCX-Luo_${{ needs.set_version.outputs.version }}_Setup.exe

            - name: Upload Cef dotnet artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Cef-Release
                  path: build/Cef
            - name: Upload setup artifact
              uses: actions/upload-artifact@v7
              with:
                  name: Cef-Setup
                  path: VRCX-Luo_${{ needs.set_version.outputs.version }}_Setup.exe

    build_dotnet_linux:
        runs-on: ubuntu-latest
        needs: set_version
        steps:
            - uses: actions/checkout@v6
            - name: Setup .NET 9
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '9.0.x'
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  cat Version
            - uses: actions/cache@v5
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/Dotnet/VRCX-Electron.csproj') }}-${{ hashFiles('**/Dotnet/VRCX-Electron-arm64.csproj') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget-
            - name: Build Electron x64 .NET Application
              run: dotnet build 'Dotnet/VRCX-Electron.csproj' -p:Configuration=Release -p:WarningLevel=0 -p:Platform=x64 -p:PlatformTarget=x64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a x64
            - name: Upload Electron x64 dotnet artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-Release-Linux-x64
                  path: build/Electron

            - name: Cleanup
              run: |
                  rm -R build/Electron

            - name: Build Electron arm64 .NET Application
              run: dotnet build 'Dotnet/VRCX-Electron-arm64.csproj' -p:Configuration=Release -p:WarningLevel=0 -p:Platform=arm64 -p:PlatformTarget=arm64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a arm64
            - name: Upload Electron arm64 dotnet artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-Release-Linux-arm64
                  path: build/Electron

    build_dotnet_macos:
        runs-on: macos-latest
        needs: set_version
        steps:
            - uses: actions/checkout@v6
            - name: Setup .NET 9
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '9.0.x'
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  cat Version
            - uses: actions/cache@v5
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('**/Dotnet/VRCX-Electron.csproj') }}-${{ hashFiles('**/Dotnet/VRCX-Electron-arm64.csproj') }}
                  restore-keys: |
                      ${{ runner.os }}-nuget-
            - name: Build Electron x64 .NET Application
              run: dotnet build 'Dotnet/VRCX-Electron.csproj' -p:Configuration=Release -p:WarningLevel=0 -p:Platform=x64 -p:PlatformTarget=x64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a x64
            - name: Upload Electron x64 .NET artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-Release-macOS-x64
                  path: build/Electron

            - name: Cleanup
              run: |
                  rm -R build/Electron

            - name: Build Electron arm64 .NET Application
              run: dotnet build 'Dotnet/VRCX-Electron-arm64.csproj' -p:Configuration=Release -p:WarningLevel=0 -p:Platform=arm64 -p:PlatformTarget=arm64 -p:RestorePackagesConfig=true -t:"Restore;Clean;Build" -m -a arm64
            - name: Upload Electron arm64 dotnet artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-Release-macOS-arm64
                  path: build/Electron

    build_node:
        runs-on: ubuntu-latest
        needs: [set_version, build_dotnet_linux]
        steps:
            - uses: actions/checkout@v6
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  cat Version
            - name: Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
            - name: Get npm cache directory
              id: npm-cache-dir
              shell: bash
              run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
            - uses: actions/cache@v5
              id: npm-cache # use this to check for `cache-hit` ==> if: steps.npm-cache.outputs.cache-hit != 'true'
              with:
                  path: ${{ steps.npm-cache-dir.outputs.dir }}
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
            - name: Restore dependencies
              run: npm ci
            - name: Build Cef-html
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SentryAuthToken }}
              run: npm run prod
            - name: Upload Cef-html artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Cef-html
                  path: build/html

            - name: Build Electron-html
              env:
                  SENTRY_AUTH_TOKEN: ${{ secrets.SentryAuthToken }}
              run: npm run prod-linux
            - name: Download Electron x64 dotnet artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Electron-Release-Linux-x64
                  path: build/Electron
            - name: Build x64 AppImage
              run: npm run build-electron
            - name: Upload Electron x64 AppImage artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-AppImage-x64
                  path: 'build/VRCX-Luo_${{ needs.set_version.outputs.version }}_x64.AppImage'

            - name: Download Electron arm64 dotnet artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Electron-Release-Linux-arm64
                  path: build/Electron
            - name: Build arm64 AppImage
              run: npm run build-electron-arm64
            - name: Upload Electron arm64 AppImage artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-AppImage-arm64
                  path: 'build/VRCX-Luo_${{ needs.set_version.outputs.version }}_arm64.AppImage'

    build_macos:
        runs-on: macos-latest
        needs: [set_version, build_dotnet_macos]
        steps:
            - uses: actions/checkout@v6
            - name: Set version
              run: |
                  echo "${{ needs.set_version.outputs.version }}" > Version
                  cat Version
            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
            - name: Get npm cache directory
              id: npm-cache-dir
              shell: bash
              run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
            - uses: actions/cache@v5
              id: npm-cache # use this to check for `cache-hit` ==> if: steps.npm-cache.outputs.cache-hit != 'true'
              with:
                  path: ${{ steps.npm-cache-dir.outputs.dir }}
                  key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                  restore-keys: |
                      ${{ runner.os }}-node-
            - name: Restore dependencies
              run: npm ci
            - name: Build Electron-html
              run: npm run prod-linux --arch=x64

            - name: Download x64 Electron dotnet artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Electron-Release-macOS-x64
                  path: build/Electron
            - name: Build x64 macOS .dmg
              run: npm run build-electron
            - name: Upload x64 Electron macOS artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-MacDmg-x64
                  path: 'build/VRCX-Luo_${{ needs.set_version.outputs.version }}_x64.dmg'

            - name: Cleanup
              run: |
                  rm -R build/Electron

            - name: Build Electron-html
              run: npm run prod-linux --arch=arm64

            - name: Download arm64 Electron dotnet artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Electron-Release-macOS-arm64
                  path: build/Electron
            - name: Build arm64 macOS .dmg
              run: npm run build-electron-arm64
            - name: Upload arm64 Electron macOS artifacts
              uses: actions/upload-artifact@v7
              with:
                  name: Electron-MacDmg-arm64
                  path: 'build/VRCX-Luo_${{ needs.set_version.outputs.version }}_arm64.dmg'

    create_setup:
        runs-on: ubuntu-latest
        needs:
            [
                set_version,
                build_dotnet_windows,
                build_dotnet_linux,
                build_dotnet_macos,
                build_node,
                build_macos
            ]
        steps:
            - name: Download Cef-Setup artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Cef-Setup
            - name: Download Cef dotnet artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Cef-Release
                  path: build/Cef
            - name: Download Cef-html artifacts
              uses: actions/download-artifact@v8
              with:
                  name: Cef-html
                  path: build/Cef/html

            - name: Make zip
              run: |
                  file_name="VRCX-Luo_${{ needs.set_version.outputs.version }}.zip"
                  cd build/Cef
                  7z a -tzip ${file_name} * -mx=7 -xr0!*.log
                  mv ${file_name} ../../${file_name}
                  echo "Zip FileName: ${file_name}"
            - name: Upload Zip artifact
              uses: actions/upload-artifact@v7
              with:
                  name: VRCX-Zip
                  path: 'VRCX-Luo_${{ needs.set_version.outputs.version }}.zip'

    publish_release:
        runs-on: ubuntu-latest
        if: |
            (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/202')) ||
            (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
        needs:
            [
                set_version,
                build_dotnet_windows,
                build_dotnet_linux,
                build_dotnet_macos,
                build_node,
                build_macos,
                create_setup
            ]
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v6
              with:
                  path: artifacts

            - name: Move artifacts for release
              run: |
                  mkdir release_assets
                  # Grab all relevant artifacts from subdirectories
                  find artifacts -type f \( -name "*.exe" -o -name "*.zip" -o -name "*.AppImage" -o -name "*.dmg" \) -exec mv {} release_assets/ \;
                  ls -R release_assets

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ needs.set_version.outputs.version }}
                  name: VRCX-Luo ${{ needs.set_version.outputs.version }}
                  body: |
                      ## VRCX-Luo 2026.6.14-fix5

                      Auto Follow follow-up fixes.

                      ### Changes

                      - Auto Follow can now be enabled while the target has no joinable room and will wait until a joinable instance appears.
                      - Added a configurable Auto Follow join cooldown in the Auto Follow dialog.
                      - Cooldown now applies only to repeated joins for the same instance; switching to a new instance follows immediately.
                      - Auto Follow launch mode continues to use live SteamVR/VRChat runtime state before joining.

                      ### Build

                      - Windows installer, portable zip, Linux AppImage, and macOS DMG are built by GitHub Actions.
                      - This release is built from the VRCX-Luo repository.
                  files: release_assets/*
                  generate_release_notes: false
                  draft: false
                  prerelease: ${{ !startsWith(github.ref, 'refs/tags/202') }}
